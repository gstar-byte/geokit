<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- 极佳的高对比度描边颜色：深炭灰 -->
    <style>
      .outline-thick {
        stroke: #1e293b;
        stroke-width: 4.5;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .outline-thin {
        stroke: #1e293b;
        stroke-width: 3.5;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
    </style>
  </defs>

  <!-- 1. 突出且清晰的大提手 (Bold Outlined Handle) — 带有明显镂空，防缩放粘连 -->
  <path d="M 23 21 L 23 11 C 23 9, 25 7, 27 7 L 37 7 C 39 7, 41 9, 41 11 L 41 21" 
        fill="#f1f5f9" 
        class="outline-thick" />

  <!-- 2. 工具箱大箱体 (Box Body) — 饱满大圆角，填充活力橙色 -->
  <rect x="8" y="21" width="48" height="36" rx="9" 
        fill="#ea580c" 
        class="outline-thick" />

  <!-- 3. 左右两条标志性装饰带 (Retro Straps) — 经典双带工具箱造型，填充明黄色 -->
  <rect x="15" y="21" width="6" height="36" 
        fill="#fcd34d" 
        class="outline-thick" />
  <rect x="43" y="21" width="6" height="36" 
        fill="#fcd34d" 
        class="outline-thick" />

  <!-- 4. 中央交叉工具 (Crossed Kit Tools) — 纯正的 Toolbox 隐喻 -->
  <g>
    <!-- 铅笔 (Pencil) — 斜向左下至右上 -->
    <!-- 笔身 -->
    <path d="M 23 45 L 37 31" 
          fill="none" 
          stroke="#1e293b" 
          stroke-width="9" 
          stroke-linecap="round" />
    <path d="M 23 45 L 37 31" 
          fill="none" 
          stroke="#ef4444" 
          stroke-width="5.5" 
          stroke-linecap="round" />
    <!-- 笔尖 (Pencil Tip) -->
    <path d="M 37 31 L 41 27 L 43 29 Z" 
          fill="#fca5a5" 
          stroke="#1e293b" 
          stroke-width="3" 
          stroke-linejoin="round" />
    <!-- 笔尖炭芯 -->
    <path d="M 40 28 L 41 27 L 42 28 Z" 
          fill="#1e293b" />
          
    <!-- 扳手 (Wrench) — 斜向右下至左上 -->
    <!-- 握杆 -->
    <path d="M 40 44 L 28 32" 
          fill="none" 
          stroke="#1e293b" 
          stroke-width="8" 
          stroke-linecap="round" />
    <path d="M 40 44 L 28 32" 
          fill="none" 
          stroke="#cbd5e1" 
          stroke-width="4.5" 
          stroke-linecap="round" />
    <!-- 扳手头部 (Wrench Head) — 圆环开口 -->
    <circle cx="25" cy="29" r="6" 
            fill="#cbd5e1" 
            stroke="#1e293b" 
            stroke-width="3.5" />
    <!-- 扳手开口 (Wrench Cutout) -->
    <path d="M 21 25 L 26 30" 
          stroke="#1e293b" 
          stroke-width="3.5" 
          stroke-linecap="round" />
  </g>
</svg>
