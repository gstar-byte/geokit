<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- 工业科技橙金渐变：用于工具箱主体，高对比高醒目 -->
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />  <!-- 金黄 -->
      <stop offset="100%" stop-color="#ea580c" /> <!-- 深橙 -->
    </linearGradient>
    <!-- 高光亮黄渐变：用于提手和星芒锁扣 -->
    <linearGradient id="light-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />  <!-- 纯白 -->
      <stop offset="100%" stop-color="#fde047" /> <!-- 亮黄 -->
    </linearGradient>
  </defs>

  <!-- 1. 结实的工业提手 (Heavy-Duty Handle) -->
  <path d="M 20 21 L 20 12 A 4 4 0 0 1 24 8 L 40 8 A 4 4 0 0 1 44 12 L 44 21" 
        fill="none" 
        stroke="url(#light-grad)" 
        stroke-width="6" 
        stroke-linecap="round" />

  <!-- 2. 工具箱上盖 (Lid) -->
  <rect x="10" y="19" width="44" height="12" rx="4" fill="url(#gold-grad)" />

  <!-- 3. 工具箱下部箱体 (Box Body) -->
  <rect x="10" y="33" width="44" height="23" rx="6" fill="url(#gold-grad)" />

  <!-- 4. 工业防滑条/加固槽 (Structural Grooves) — 增强工具箱硬核质感 -->
  <line x1="16" y1="47" x2="24" y2="39" stroke="#0a0e1a" stroke-width="4.5" stroke-linecap="round" />
  <line x1="40" y1="47" x2="48" y2="39" stroke="#0a0e1a" stroke-width="4.5" stroke-linecap="round" />

  <!-- 5. AI 星芒锁扣 (AI Sparkle Latch) — 精致交融 AI 智能与工具箱锁扣 -->
  <path d="M 32 22 Q 32 32 22 32 Q 32 32 32 42 Q 32 32 42 32 Q 32 32 32 22 Z" 
        fill="url(#light-grad)" />
</svg>
